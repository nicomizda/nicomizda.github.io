<!DOCTYPE html>
<html lang="ja">

<head>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/drawing.css">
</head>

<body class="drawing">
  <!-- FIXED HEADER -->
  <div id="header"></div>
  <script src="../js/script.js"></script> <!-- ../一階層上のフォルダへ移動 -->

  <!-- GALLERY -->
  
  <main class="drawing-container">
    
    <div class="grid">
      <div class="item wide"
        data-preview="../images/scene01_03.png"
        onclick="openModal(this)">
        <img src="../images/scene01_03.png">
        <div class="overlay">        
          <p class="title">Scene01</p>
        </div>
      </div>
      
      <div class="item wide" 
        data-preview="../images/butterfly_original.png"
        onclick="openModal(this)">
        <img src="../images/butterfly_original.png">
        <div class="overlay">        
          <p class="title">Untitled</p>
        </div>
      </div>

      <div class="item rectangle" 
        data-preview="../images/chinatown.png"
        onclick="openModal(this)">
        <img src="../images/chinatown.png">
        <div class="overlay">        
          <p class="title">Untitled</p>
        </div>
      </div>

      <div class="item rectangle" 
        data-preview="../images/bird_preview.png"
        onclick="openModal(this)">
        <img src="../images/bird_icon.png">
        <div class="overlay">        
          <p class="title">Bird? -LINE Emoji-</p>
        </div>
      </div>

      <div class="item rectangle" 
        data-preview="../images/joey_preview.png"
        onclick="openModal(this)">
        <img src="../images/joey_icon.png">
        <div class="overlay">        
          <p class="title">Joey -LINE Emoji-</p>
        </div>
      </div>

      <div class="item rectangle" 
        data-preview="../images/daniel_preview.png"
        onclick="openModal(this)">
        <img src="../images/daniel_icon.png">
        <div class="overlay">        
          <p class="title">Daniel -LINE Emoji-</p>
        </div>
      </div>
      
    </div>
    
  </main>
  
  <!-- POP UP -->
  
  <div id="modal" onclick="closeModal()">
  <img id="modalImg">
  </div>

  <div id="footer"></div>

</body>

<!DOCTYPE html>
<html lang="ja">

<head>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/drawing.css">
</head>

<body class="drawing">
  <!-- FIXED HEADER -->
  <div id="header"></div>
  <script src="../js/script.js"></script> <!-- ../一階層上のフォルダへ移動 -->

  <!-- GALLERY -->
  
  <main class="drawing-container">
    
    <div class="grid">
      <div class="item wide" onclick="openModal(this.querySelector('img'))">
        <img src="../images/scene01_03.png">
        <div class="overlay">        
          <p class="title">Scene01</p>
        </div>
      </div>
      
      <div class="item wide" onclick="openModal(this.querySelector('img'))">
        <img src="../images/butterfly_original.png">
        <div class="overlay">        
          <p class="title">butterfly</p>
        </div>
      </div>

      <div class="item rectangle" onclick="openModal(this.querySelector('img'))">
        <img src="../images/chinatown.png">
        <div class="overlay">        
          <p class="title">Untitled</p>
        </div>
      </div>

      <div class="item rectangle" onclick="openModal(this.querySelector('img'))">
        <img src="../images/Nico.png">
        <div class="overlay">        
          <p class="title">Me Icon</p>
        </div>
      </div>
      
    </div>
    
  </main>
  
  <!-- POP UP -->
  
  <div id="modal" onclick="closeModal()">
  <img id="modalImg">
  </div>

  <div id="footer"></div>

</body>

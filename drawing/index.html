<!DOCTYPE html>
<html lang="ja">

<head>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/drawing.css">
</head>

<body class="drawing">
  <!-- FIXED HEADER -->
  <div id="header"></div>
  <script src="../js/script.js"></script> <!-- ../一階層上のフォルダへ移動 -->

  <!-- GALLERY -->
  
  <main class="drawing-container">
    <div class="grid">
      <img src="../images/butterfly_original.png"  class="item square" onclick="openModal(this)">
      <div class="overlay">        
        <p class="title">Spider Land</p>
      </div>

      <img src="../images/dumbdog_icon.png"  class="item rectangle" onclick="openModal(this)">
      <div class="overlay">        
        <p class="title">Spider Land</p>
      </div>

      <img src="../images/Nico.png"  class="item square" onclick="openModal(this)">
      <div class="overlay">        
        <p class="title">Spider Land</p>
      </div>

      <img src="../images/butterfly_original.png"  class="item square" onclick="openModal(this)">
      <div class="overlay">        
        <p class="title">Spider Land</p>
      </div>
    </div>
  </main>
  
  <!-- POP UP -->
  
  <div id="modal" onclick="closeModal()">
  <img id="modalImg">
  </div>

  <div id="footer"></div>

</body>
